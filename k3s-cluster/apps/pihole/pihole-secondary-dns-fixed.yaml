apiVersion: v1
kind: Service
metadata:
  name: pihole-secondary-dns-tcp
  namespace: pihole
  annotations:
    metallb.universe.tf/allow-shared-ip: "pihole-secondary-dns-shared"
spec:
  selector:
    app.kubernetes.io/instance: pihole
    app.kubernetes.io/name: pihole
  ports:
  - port: 53
    protocol: TCP
    targetPort: 53
  type: LoadBalancer
  loadBalancerIP: 192.168.1.25
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-secondary-dns-udp
  namespace: pihole
  annotations:
    metallb.universe.tf/allow-shared-ip: "pihole-secondary-dns-shared"
spec:
  selector:
    app.kubernetes.io/instance: pihole
    app.kubernetes.io/name: pihole
  ports:
  - port: 53
    protocol: UDP
    targetPort: 53
  type: LoadBalancer
  loadBalancerIP: 192.168.1.25
