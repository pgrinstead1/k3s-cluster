apiVersion: v1
kind: Service
metadata:
  name: pihole-secondary-dns-tcp
  namespace: pihole
spec:
  type: LoadBalancer
  loadBalancerIP: "************"
  ports:
  - port: 53
    protocol: TCP
    targetPort: 53
  selector:
    app.kubernetes.io/instance: pihole
    app.kubernetes.io/name: pihole
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-secondary-dns-udp
  namespace: pihole
spec:
  type: LoadBalancer
  loadBalancerIP: "************"
  ports:
  - port: 53
    protocol: UDP
    targetPort: 53
  selector:
    app.kubernetes.io/instance: pihole
    app.kubernetes.io/name: pihole
