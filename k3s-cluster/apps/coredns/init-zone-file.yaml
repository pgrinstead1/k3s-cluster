apiVersion: v1
kind: Pod
metadata:
  name: init-zone-file
  namespace: kube-system
spec:
  restartPolicy: Never
  containers:
  - name: init-zone-file
    image: busybox
    command: ["sh", "-c", "echo '$ORIGIN k8s.local.\n$TTL 300\n@ IN SOA k8s.local. hostmaster.k8s.local. 1 300 300 300 300\n@ IN NS ns1.k8s.local.\nns1 IN A 10.43.0.10\n' > /data/k8s.local.db && echo 'Zone file created successfully'"]
    volumeMounts:
    - name: zone-data
      mountPath: /data
  volumes:
  - name: zone-data
    persistentVolumeClaim:
      claimName: coredns-zone-pvc
