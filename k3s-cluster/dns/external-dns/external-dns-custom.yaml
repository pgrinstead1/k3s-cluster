apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns-custom
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: external-dns-custom
  template:
    metadata:
      labels:
        app: external-dns-custom
    spec:
      serviceAccountName: external-dns
      containers:
      - name: external-dns
        image: bitnami/kubectl:latest
        command: ["/bin/sh"]
        args: ["-c", "chmod +x /scripts/update-dns.sh && /scripts/update-dns.sh"]
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: coredns-zone
          mountPath: /etc/coredns/shared
      volumes:
      - name: scripts
        configMap:
          name: external-dns-script
          defaultMode: 0755
      - name: coredns-zone
        persistentVolumeClaim:
          claimName: coredns-zone-pvc
