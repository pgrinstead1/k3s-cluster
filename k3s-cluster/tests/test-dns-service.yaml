apiVersion: v1
kind: Service
metadata:
  name: test-dns
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/hostname: test-dns.k8s.local
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: test-dns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-dns
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-dns
  template:
    metadata:
      labels:
        app: test-dns
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
